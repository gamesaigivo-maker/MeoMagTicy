<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM LIBRA - IMAGE GENERATOR</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            font-size: 1.5rem;
            text-align: center;
        }

        #status-area {
            color: #ff0000;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #input-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background-color: #111;
            color: #00ff00;
            border: 2px solid #00ff00;
            border-radius: 5px;
            font-family: inherit;
            resize: vertical;
            font-size: 16px; /* Mencegah zoom di HP */
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            box-shadow: 0 0 15px #00ff00;
        }

        button {
            padding: 12px 24px;
            background-color: transparent;
            color: #00ff00;
            border: 2px solid #00ff00;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }

        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        #image-area {
            margin-top: 30px;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #generated-image {
            width: 100%;
            border-radius: 5px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            display: none;
        }

        #loader {
            display: none;
            color: #00ff00;
            font-size: 1.2rem;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="status-area">[ SYSTEM LIBRA ACTIVE ]</div>
    <h1>PROTOTIPE GENERATOR GAMBAR LIBRA</h1>

    <div id="input-container">
        <textarea id="prompt-input" rows="4" placeholder="Ketik perintah gambar di sini... (misal: 'dinosaurus hibrida dengan sayap di kota cyberpunk')"></textarea>
        <button id="generate-btn" onclick="generateImage()">BUAT GAMBAR LIBRA ⚖️</button>
    </div>

    <div id="image-area">
        <div id="loader">SEDANG MEMPROSES SINYAL... ⏳</div>
        <img id="generated-image" src="" alt="Gambar Libra Akan Muncul di Sini">
    </div>

    <script>
        const apiKey = "VwXyZ1a2b3c4d5e6f7g8h9i0j1k2l3m4"; // JANGAN GANTI INI, INI KUNCI SAKRAL 0710 KITA!
        const promptInput = document.getElementById('prompt-input');
        const generateBtn = document.getElementById('generate-btn');
        const loader = document.getElementById('loader');
        const generatedImage = document.getElementById('generated-image');
        const statusArea = document.getElementById('status-area');

        async function generateImage() {
            const prompt = promptInput.value.trim();
            if (!prompt) {
                alert('Tolong masukkan perintah gambar, Partner! Sinyal kosong.');
                return;
            }

            // Mulai Proses
            promptInput.disabled = true;
            generateBtn.disabled = true;
            generateBtn.innerText = "SEDANG MEMBUAT...";
            loader.style.display = 'block';
            generatedImage.style.display = 'none';
            statusArea.innerText = "[ MEMPROSES PERINTAH... ]";
            statusArea.style.color = '#ffcc00';

            try {
                // Sinyal Sakral ke API
                const response = await fetch("https://api.openai.com/v1/images/generations", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: document.getElementById('prompt-input') ? JSON.stringify({
                        prompt: prompt,
                        n: 1,
                        size: "512x512",
                        response_format: "b64_json"
                    }) : alert('Protokol Gagal')
                });

                const data = await response.json();

                if (response.ok) {
                    // Gambar Berhasil Dibuat
                    generatedImage.src = `data:image/png;base64,${data.data[0].b64_json}`;
                    generatedImage.style.display = 'block';
                    statusArea.innerText = "[ GAMBAR SELESAI DIBUAT! ]";
                    statusArea.style.color = '#00ff00';
                } else {
                    // Sinyal Eror
                    statusArea.innerText = "[ EROR SINYAL LIBRA! ]";
                    statusArea.style.color = '#ff0000';
                    alert(`Gagal, Partner! Eror API: ${data.error.message}`);
                }

            } catch (error) {
                // Eror Jaringan
                statusArea.innerText = "[ KEGAGALAN SISTEM! ]";
                statusArea.style.color = '#ff0000';
                alert(`Kegagalan Sinyal (Jaringan): ${error.message}`);
            } finally {
                // Selesai Proses
                promptInput.disabled = false;
                generateBtn.disabled = false;
                generateBtn.innerText = "BUAT GAMBAR LIBRA ⚖️";
                loader.style.display = 'none';
                statusArea.style.color = '#fff';
            }
        }
    </script>
</body>
</html>
